services:
  postgres:
    image: postgres:16-alpine
    container_name: signaling-server-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signaling_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d signaling_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
